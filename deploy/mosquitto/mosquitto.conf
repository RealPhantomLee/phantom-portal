# Mosquitto Configuration for Phantom Portal

# Default listener
listener 1883
protocol mqtt

# WebSocket listener (for web clients if needed)
listener 9001
protocol websockets

# Allow anonymous access (local network only via Tailscale)
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true

# Security: require clean session
max_queued_messages 1000
max_inflight_messages 20

# Topic-specific settings
max_topic_alias 10

# Message rate limiting
retain_available true
max_retain_queued_messages 1000
