upstream phantom_api {
    server 127.0.0.1:8000;
}

server {
    listen 127.0.0.1:7080;
    server_name cyberdeck.REDACTED_TAILNET.ts.net;

    # X-Real-IP pass-through from Tailscale Serve
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Service worker — no-cache so updates propagate immediately
    location /sw.js {
        alias /home/jolly/Projects/phantom/frontend/dist/sw.js;
        add_header Cache-Control "max-age=0, no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
    }

    # Backend health check
    location /health {
        proxy_pass http://phantom_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API endpoints proxy to FastAPI backend
    location /api/ {
        proxy_pass http://phantom_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # WebSocket for motion alerts and note sync
    location /ws/ {
        proxy_pass http://phantom_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # React PWA static files
    location / {
        root /home/jolly/Projects/phantom/frontend/dist;
        error_page 404 =200 /index.html;
        add_header Cache-Control "public, max-age=3600" always;
        expires 1h;
    }

    # Block access to sensitive paths
    location ~ /\.git {
        deny all;
    }

    location ~ /config {
        deny all;
    }
}
