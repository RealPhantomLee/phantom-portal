version: '3.8'

services:
  # PostgreSQL is optional - SQLite is default for simplicity on Pi
  # If scaling to multi-device sync, switch to PostgreSQL

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: phantom-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    restart: unless-stopped

  phantom-api:
    build:
      context: ..
      dockerfile: Dockerfile.backend
    container_name: phantom-api
    ports:
      - "8000:8000"
    environment:
      PHANTOM_CONFIG_PATH: /phantom/phantom.config.yaml
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../phantom.config.yaml:/phantom/phantom.config.yaml:ro
      - ../data:/phantom/data
      - ../backend:/app/backend
    depends_on:
      - mosquitto
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  phantom-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: phantom-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: https://cyberdeck.tail3ab12c.ts.net/api
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: phantom-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/phantom.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/app/dist:ro
      - /home/jolly/.local/share/tailscale/certs:/etc/nginx/certs:ro
    depends_on:
      - phantom-api
      - phantom-frontend
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_logs:
